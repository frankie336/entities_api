*filter

# ── Default policies ───────────────────────────────────────────────────────────
# Drop everything by default; explicit rules below open only what we need.
:INPUT   DROP [0:0]
:FORWARD DROP [0:0]
:OUTPUT  DROP [0:0]

# ── Loopback ───────────────────────────────────────────────────────────────────
-A INPUT  -i lo -j ACCEPT
-A OUTPUT -o lo -j ACCEPT

# ── Established / related inbound ─────────────────────────────────────────────
# Allows responses to connections we initiated (e.g. HTTP replies from pip).
-A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT

# ── DNS ───────────────────────────────────────────────────────────────────────
# Must come BEFORE the RFC-1918 drop rules because the Docker DNS resolver
# typically lives at 127.0.0.11 (loopback, already allowed above) or at the
# gateway address in the 172.17.x.x range.  If your Docker daemon uses a
# custom DNS (e.g. 1.1.1.1 via --dns flag on the daemon), DNS will work
# without this rule.  Keeping it explicit here is the safe default.
-A OUTPUT -p udp --dport 53 -j ACCEPT
-A OUTPUT -p tcp --dport 53 -j ACCEPT

# ── Block Docker-internal / RFC-1918 outbound ─────────────────────────────────
# Covers:
#   10.0.0.0/8     — class A private, often used by overlay networks
#   172.16.0.0/12  — default Docker bridge range (172.17.x.x etc.)
#   192.168.0.0/16 — class C private, host-mode containers / VMs
#
# These rules prevent the jailed shell from reaching internal services such as
# mysql (3306), redis (6379), qdrant (6333/6334), or the api container (9000).
-A OUTPUT -d 10.0.0.0/8     -j DROP
-A OUTPUT -d 172.16.0.0/12  -j DROP
-A OUTPUT -d 192.168.0.0/16 -j DROP

# ── Allow all remaining outbound (public internet) ────────────────────────────
# pip, curl, wget, public APIs, package registries — all pass through here.
-A OUTPUT -j ACCEPT

COMMIT