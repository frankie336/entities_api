[supervisord]
nodaemon=true

[program:fastapi]
# Removed the firejail wrapper to prevent nesting conflicts with the service-level firejail
command=uvicorn sandbox.main:app --host 0.0.0.0 --port 8000 --workers 1
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=sandboxuser