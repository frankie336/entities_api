events {
    worker_connections 1024;
}

http {
    # ── Rate limiting ────────────────────────────────────────────────────────
    # 30 requests/minute per IP with a burst of 20.
    # Adjust rate to suit your SDK/client usage patterns.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream fastapi {
        server api:9000;
    }

    upstream jaeger {
        server jaeger_ui:16686;
    }

    # ── Main API — HTTP (upgrade to HTTPS when domain/certs are available) ───
    server {
        listen 80;
        server_name localhost;

        # File upload limit — covers file/vector store ingestion endpoints
        client_max_body_size 100M;

        # Gzip for JSON API responses
        gzip on;
        gzip_types application/json text/plain text/html;
        gzip_min_length 1000;

        # ── FastAPI ──────────────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://fastapi;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for long-running agentic runs
            proxy_read_timeout    300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;

            # SSE / streaming support for run status endpoints
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            chunked_transfer_encoding on;
        }

        # ── WebSocket endpoints (sandbox shell + code execution) ─────────────
        location /ws/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade   $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host      $host;
            proxy_read_timeout 3600s;
        }

        # ── Jaeger UI — observability dashboard ──────────────────────────────
        # Available at http://localhost/jaeger/
        # Restrict to internal/VPN access only in production.
        location /jaeger/ {
            proxy_pass http://jaeger/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTPS server block (commented out until certs are available) ─────────
    # To enable:
    #   1. Obtain certs (Let's Encrypt, Cloudflare, self-signed for dev)
    #   2. Place at ./docker/nginx/certs/fullchain.pem and privkey.pem
    #   3. Uncomment the 443 port in docker-compose.yml nginx service
    #   4. Uncomment the certs volume mount in docker-compose.yml nginx service
    #   5. Uncomment this block and update server_name to your domain
    #
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     client_max_body_size 100M;
    #     gzip on;
    #     gzip_types application/json text/plain text/html;
    #
    #     location / {
    #         limit_req zone=api burst=20 nodelay;
    #         proxy_pass http://fastapi;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_read_timeout    300s;
    #         proxy_connect_timeout 10s;
    #         proxy_send_timeout    300s;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Connection "";
    #         proxy_buffering    off;
    #         chunked_transfer_encoding on;
    #     }
    #
    #     location /ws/ {
    #         proxy_pass http://fastapi;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade   $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_set_header Host      $host;
    #         proxy_read_timeout 3600s;
    #     }
    # }
}